<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>HTML 语法实验</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f4f1ea;
        color: #17211b;
      }

      * { box-sizing: border-box; }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 48px 24px;
        background:
          radial-gradient(circle at 15% 15%, rgba(209, 232, 216, 0.9), transparent 32%),
          radial-gradient(circle at 85% 80%, rgba(240, 210, 157, 0.6), transparent 30%),
          #f4f1ea;
      }

      .lesson-card {
        width: min(760px, 100%);
        padding: 42px;
        border: 1px solid #bbc9bd;
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.92);
        box-shadow: 0 24px 70px rgba(36, 56, 43, 0.14);
      }

      .eyebrow {
        margin: 0 0 8px;
        color: #477355;
        font-size: 13px;
        font-weight: 750;
        letter-spacing: 0.14em;
      }

      h1 {
        margin: 0;
        font-size: clamp(34px, 6vw, 58px);
        line-height: 1.05;
        letter-spacing: -0.04em;
      }

      .lead {
        margin: 18px 0 30px;
        color: #4f5d53;
        font-size: 18px;
        line-height: 1.75;
      }

      .syntax-grid {
        display: grid;
        grid-template-columns: 116px 1fr;
        gap: 24px;
        align-items: center;
        padding: 22px;
        border-radius: 20px;
        background: #edf5ef;
      }

      .html-mark {
        width: 96px;
        height: 96px;
        border-radius: 20px;
      }

      code {
        padding: 2px 7px;
        border-radius: 6px;
        background: #dde9df;
        color: #225a35;
      }

      .field {
        margin-top: 28px;
        display: grid;
        gap: 8px;
      }

      label { font-weight: 700; }

      input {
        width: 100%;
        padding: 13px 15px;
        border: 1px solid #8ca491;
        border-radius: 11px;
        font: inherit;
      }

      input:focus {
        outline: 3px solid rgba(44, 117, 70, 0.22);
        border-color: #2c7546;
      }

      button {
        margin-top: 20px;
        border: 0;
        border-radius: 999px;
        padding: 12px 18px;
        background: #1e6b3b;
        color: white;
        font: inherit;
        font-weight: 750;
        cursor: pointer;
      }

      button:hover { background: #15552e; }

      .details {
        margin: 16px 0 0;
        padding: 14px 16px;
        border-left: 4px solid #d19835;
        background: #fff7e8;
        line-height: 1.65;
      }

      @media (max-width: 560px) {
        .lesson-card { padding: 28px; }
        .syntax-grid { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <article id="lesson" class="lesson-card" lang="zh-CN" data-topic="html-syntax">
      <header>
        <p class="eyebrow">FRONTEND · HTML</p>
        <h1>HTML 语法实验</h1>
      </header>

      <p class="lead">
        元素可以包含文本和 <strong>其他元素</strong>；
        <code>&lt;</code> 与 <code>&amp;</code> 需要按上下文转义。
      </p>

      <section class="syntax-grid" aria-labelledby="syntax-title">
        <img
          class="html-mark"
          src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI5NiIgaGVpZ2h0PSI5NiIgdmlld0JveD0iMCAwIDk2IDk2Ij48cmVjdCB3aWR0aD0iOTYiIGhlaWdodD0iOTYiIHJ4PSIyMCIgZmlsbD0iIzFlNmIzYiIvPjx0ZXh0IHg9IjQ4IiB5PSI1NyIgdGV4dC1hbmNob3I9Im1pZGRsZSIgZm9udC1mYW1pbHk9IkFyaWFsLHNhbnMtc2VyaWYiIGZvbnQtc2l6ZT0iMjQiIGZvbnQtd2VpZ2h0PSI3MDAiIGZpbGw9IndoaXRlIj5IVE1MPC90ZXh0Pjwvc3ZnPg=="
          width="96"
          height="96"
          alt="由 HTML 字样组成的绿色示例图"
        >
        <div>
          <h2 id="syntax-title">元素和属性各司其职</h2>
          <p>元素表达结构与语义；属性为当前元素提供标识、配置或状态。</p>
        </div>
      </section>

      <div class="field">
        <label for="project-name">项目名称</label>
        <input id="project-name" name="projectName" value="Lili" required>
      </div>

      <button id="toggle" type="button" aria-controls="details" aria-expanded="false">
        显示属性说明
      </button>
      <p id="details" class="details" hidden>
        <code>hidden</code> 属性存在时，此段落不显示；删除属性后才显示。
      </p>
    </article>

    <script>
      const toggle = document.querySelector("#toggle");
      const details = document.querySelector("#details");

      toggle.addEventListener("click", () => {
        details.hidden = !details.hidden;
        toggle.setAttribute("aria-expanded", String(!details.hidden));
        toggle.textContent = details.hidden ? "显示属性说明" : "隐藏属性说明";
      });
    </script>
  </body>
</html>
