<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DOM 学习清单演示</title>
  <style>
    :root { color-scheme: light; font-family: system-ui, sans-serif; background: #f5f7fb; color: #172033; }
    * { box-sizing: border-box; }
    body { margin: 0; padding: 32px 18px; }
    main { width: min(760px, 100%); margin: auto; background: white; border: 1px solid #dbe2ef; border-radius: 18px; padding: 24px; box-shadow: 0 16px 45px rgb(35 55 90 / 10%); }
    h1 { margin: 0 0 6px; font-size: clamp(1.65rem, 4vw, 2.3rem); }
    .lead { margin: 0 0 22px; color: #526078; }
    form { display: grid; grid-template-columns: 1fr auto; gap: 10px; }
    input, button { min-height: 44px; border-radius: 10px; font: inherit; }
    input { width: 100%; border: 1px solid #aeb9ca; padding: 0 12px; }
    button { border: 0; padding: 0 16px; background: #3157d5; color: white; cursor: pointer; font-weight: 650; }
    button.secondary { background: #e9edfa; color: #253a78; }
    button.danger { min-height: 36px; padding: 0 12px; background: #fff0f0; color: #a12626; }
    .toolbar { display: flex; flex-wrap: wrap; gap: 8px; margin: 18px 0 12px; }
    .toolbar button[aria-pressed="true"] { background: #172b68; color: white; }
    .status { min-height: 24px; color: #465570; }
    ul { list-style: none; margin: 12px 0 0; padding: 0; display: grid; gap: 10px; }
    li { display: grid; grid-template-columns: auto 1fr auto; gap: 12px; align-items: center; border: 1px solid #dce3ef; border-radius: 12px; padding: 12px; }
    li[data-completed="true"] .title { color: #657188; text-decoration: line-through; }
    .empty { display: block; color: #657188; text-align: center; padding: 24px; border-style: dashed; }
    @media (max-width: 520px) {
      body { padding: 14px; }
      main { padding: 18px; }
      form { grid-template-columns: 1fr; }
      li { grid-template-columns: auto 1fr; }
      li .danger { grid-column: 1 / -1; }
    }
  </style>
</head>
<body>
  <main>
    <h1>DOM 学习清单</h1>
    <p class="lead">创建、更新、筛选与删除节点；输入只通过 textContent 输出。</p>
    <form id="add-form">
      <label>
        <span class="sr-only">知识点标题</span>
        <input id="title-input" name="title" required maxlength="60" autocomplete="off" placeholder="输入知识点，例如：DocumentFragment">
      </label>
      <button type="submit">添加知识点</button>
    </form>
    <div class="toolbar" aria-label="筛选清单">
      <button class="secondary" type="button" data-filter="all" aria-pressed="true">全部</button>
      <button class="secondary" type="button" data-filter="active" aria-pressed="false">未完成</button>
      <button class="secondary" type="button" data-filter="completed" aria-pressed="false">已完成</button>
      <button class="secondary" id="reset-button" type="button">重置演示</button>
    </div>
    <p class="status" id="status" role="status" aria-live="polite"></p>
    <ul id="lesson-list"></ul>
  </main>
  <script>
    const initialItems = [
      { id: 1, title: 'querySelector 与作用域', completed: true },
      { id: 2, title: 'createElement 与 textContent', completed: false },
      { id: 3, title: '<img src=x onerror=alert(1)>', completed: false },
    ];

    const form = document.querySelector('#add-form');
    const input = document.querySelector('#title-input');
    const list = document.querySelector('#lesson-list');
    const status = document.querySelector('#status');
    const toolbar = document.querySelector('.toolbar');
    const resetButton = document.querySelector('#reset-button');
    let items = initialItems.map((item) => ({ ...item }));
    let filter = 'all';
    let nextId = 4;

    function visibleItems() {
      if (filter === 'active') return items.filter((item) => !item.completed);
      if (filter === 'completed') return items.filter((item) => item.completed);
      return items;
    }

    function createItemElement(item) {
      const row = document.createElement('li');
      row.dataset.id = String(item.id);
      row.dataset.completed = String(item.completed);

      const checkbox = document.createElement('input');
      checkbox.type = 'checkbox';
      checkbox.checked = item.completed;
      checkbox.setAttribute('aria-label', `切换“${item.title}”完成状态`);

      const title = document.createElement('span');
      title.className = 'title';
      title.textContent = item.title;

      const remove = document.createElement('button');
      remove.type = 'button';
      remove.className = 'danger';
      remove.dataset.action = 'remove';
      remove.textContent = '删除';

      row.append(checkbox, title, remove);
      return row;
    }

    function render() {
      const visible = visibleItems();
      const fragment = document.createDocumentFragment();
      for (const item of visible) fragment.append(createItemElement(item));

      list.replaceChildren(fragment);
      if (visible.length === 0) {
        const empty = document.createElement('li');
        empty.className = 'empty';
        empty.textContent = '当前筛选条件下没有知识点';
        list.append(empty);
      }

      const completed = items.filter((item) => item.completed).length;
      status.textContent = `共 ${items.length} 项，已完成 ${completed} 项，当前显示 ${visible.length} 项。`;
    }

    form.addEventListener('submit', (event) => {
      event.preventDefault();
      const title = input.value.trim();
      if (title === '') return;
      items = [...items, { id: nextId, title, completed: false }];
      nextId += 1;
      input.value = '';
      render();
      input.focus();
    });

    list.addEventListener('change', (event) => {
      if (!(event.target instanceof HTMLInputElement)) return;
      const row = event.target.closest('[data-id]');
      if (!row) return;
      const id = Number(row.dataset.id);
      items = items.map((item) => item.id === id
        ? { ...item, completed: event.target.checked }
        : item);
      render();
    });

    list.addEventListener('click', (event) => {
      const button = event.target.closest('button[data-action="remove"]');
      if (!button) return;
      const row = button.closest('[data-id]');
      const id = Number(row.dataset.id);
      items = items.filter((item) => item.id !== id);
      render();
    });

    toolbar.addEventListener('click', (event) => {
      const button = event.target.closest('button[data-filter]');
      if (!button) return;
      filter = button.dataset.filter;
      for (const item of toolbar.querySelectorAll('[data-filter]')) {
        item.setAttribute('aria-pressed', String(item === button));
      }
      render();
    });

    resetButton.addEventListener('click', () => {
      items = initialItems.map((item) => ({ ...item }));
      filter = 'all';
      nextId = 4;
      for (const item of toolbar.querySelectorAll('[data-filter]')) {
        item.setAttribute('aria-pressed', String(item.dataset.filter === 'all'));
      }
      render();
    });

    render();
  </script>
</body>
</html>
